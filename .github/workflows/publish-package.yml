name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - "plugin-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Build framework
        run: python3 scripts/build_framework.py
      - name: Validate framework
        run: python3 scripts/validate_framework.py
      - name: Run Python tests
        run: python3 -m unittest tests/test_framework_tools.py
      - name: Run Node tests
        run: node --test tests/node/install.test.mjs
      - name: Publish package
        run: npm publish --access public
        working-directory: plugins/agent-quality-police
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
